<main class="shell">
  <header class="shell__header">
    <div class="shell__brand">
      <span class="logo-dot"></span>
      <div>
        <h1>The Metric Convert</h1>
        <p>Practice metric conversions with clear, step-by-step explanations.</p>
      </div>
    </div>
    <nav class="shell__nav">
      <!-- TODO: Replace hard-coded labels with i18n-friendly tokens once translations are needed. -->
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Converter
      </a>
      <a routerLink="/learn" routerLinkActive="active">
        Learn
      </a>
      <a href="http://localhost:5080/swagger" target="_blank" rel="noopener">
        API docs
      </a>
    </nav>
  </header>

  <section class="shell__body">
    <!-- Route content: converter, learning pages, future lessons/quizzes. -->
    <router-outlet />
  </section>
</main>
