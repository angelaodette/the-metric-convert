<main class="shell" [attr.data-theme]="theme()">
  <header class="shell__header">
    <div class="shell__brand">
      <img 
        class="shell__logo navbar-logo" 
        [src]="theme() === 'dark' ? 'assets/navbar-dark.svg' : 'assets/navbar-light.svg'" 
        alt="The Metric Convert logo" 
      />
      <div>
        <h1>The Metric Convert</h1>
        <p>Practice metric conversions with clear, step-by-step explanations.</p>
      </div>
    </div>
    <nav class="shell__nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Converter
      </a>
      <a routerLink="/lessons" routerLinkActive="active">
        Lessons
      </a>
      <a routerLink="/units" routerLinkActive="active">
        Units
      </a>
      <a routerLink="/profile" routerLinkActive="active">
        Profile
      </a>
      <button class="shell__theme-toggle" (click)="toggleTheme()" [attr.aria-label]="theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'">
        <span class="theme-icon" *ngIf="theme() === 'dark'">☀️</span>
        <span class="theme-icon" *ngIf="theme() === 'light'">🌙</span>
      </button>
    </nav>
  </header>

  <section class="shell__body">
    <!-- Route content: converter, learning pages, future lessons/quizzes. -->
    <router-outlet />
  </section>
</main>
