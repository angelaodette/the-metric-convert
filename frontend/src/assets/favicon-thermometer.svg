<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#1A1A2E" rx="12"/>
  <!-- Tube outline -->
  <rect x="24" y="4" width="16" height="36" rx="8" fill="none" stroke="#F5F0EB" stroke-width="1.5" opacity="0.25"/>
  <!-- Tube fill background -->
  <rect x="26" y="6" width="12" height="32" rx="6" fill="#7A0C0C" opacity="0.5"/>
  <!-- Mercury fill -->
  <rect x="26" y="14" width="12" height="24" fill="#B82020"/>
  <!-- Tick marks -->
  <line x1="40" y1="8"  x2="47" y2="8"  stroke="#EF9F27" stroke-width="1.5"/>
  <line x1="40" y1="16" x2="44" y2="16" stroke="#F5F0EB" stroke-width="1"   opacity="0.5"/>
  <line x1="40" y1="24" x2="47" y2="24" stroke="#EF9F27" stroke-width="1.5"/>
  <line x1="40" y1="32" x2="44" y2="32" stroke="#F5F0EB" stroke-width="1"   opacity="0.5"/>
  <!-- Stem connecting tube to bulb -->
  <rect x="26" y="36" width="12" height="12" fill="#B82020"/>
  <!-- Bulb outer glow -->
  <circle cx="32" cy="52" r="12" fill="#7A0C0C" opacity="0.25"/>
  <!-- Bulb body -->
  <circle cx="32" cy="52" r="10" fill="#B82020"/>
  <!-- Bulb inner highlight -->
  <circle cx="32" cy="52" r="7"  fill="#E83030"/>
  <!-- Spark highlight dot -->
  <circle cx="28" cy="48" r="2.5" fill="#EF9F27" opacity="0.7"/>
</svg>
